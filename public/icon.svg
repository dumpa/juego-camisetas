<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <rect width="512" height="512" fill="#F2EBDD"/>
  <filter id="grain">
    <feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="2"/>
    <feColorMatrix values="0 0 0 0 0.11, 0 0 0 0 0.09, 0 0 0 0 0.07, 0 0 0 0.08 0"/>
  </filter>
  <rect width="512" height="512" filter="url(#grain)" opacity="0.4"/>
  <!-- Tres rombos diagonales, los tres tonos -->
  <g transform="translate(256 256)">
    <!-- Tinta -->
    <g transform="translate(-90 -55) rotate(45)">
      <rect x="-50" y="-50" width="100" height="100" fill="#1C1813"/>
    </g>
    <!-- Granate -->
    <g transform="translate(0 0) rotate(45)">
      <rect x="-65" y="-65" width="130" height="130" fill="#8B2D1C"/>
    </g>
    <!-- Dorado -->
    <g transform="translate(90 55) rotate(45)">
      <rect x="-45" y="-45" width="90" height="90" fill="#A07E2B"/>
    </g>
  </g>
</svg>
